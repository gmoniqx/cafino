<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafino Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 0%, #f3ece0, #f7f2e9 50%, #fbf8f3 100%);
        color: #4a3a22;
        font-family: "Cormorant Garamond", Georgia, serif;
        padding: 24px;
      }
      main {
        width: min(100%, 420px);
        border: 1px solid #d8c8ad;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 12px 30px rgba(47, 35, 17, 0.08);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
        font-weight: 300;
      }
      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Cafino will sync your view when your connection returns. Reopen the app or try again in a moment.</p>
    </main>
  </body>
</html>
